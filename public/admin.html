<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { align-items: flex-start; padding-top: 6rem; }
        .admin-container { width: 100%; max-width: 900px; margin: 0 auto 2rem; }
        .section { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
        .section h3 { margin-bottom: 1rem; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.9rem;}
        th { color: var(--text-muted); }
        .btn-sm { padding: 0.4rem 0.8rem; border-radius: 4px; border: none; cursor: pointer; color: white; font-size: 0.8rem; }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .btn-warning { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid #f59e0b; }
        .btn-success { background: #10b981; }
        
        .add-user-bar { display: flex; gap: 10px; margin-bottom: 1rem; }
        .add-user-bar input, .add-user-bar select { padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border); background: rgba(0,0,0,0.5); color: white; flex: 1; outline:none; }
        
        .wallpaper-thumbs { display: flex; gap: 10px; margin-bottom: 1rem; }
        .thumb { width: 80px; height: 50px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; object-fit: cover; }
        .thumb:hover { border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="index.html" class="btn-nav" style="background: #3b82f6; border: none;">← Back to App</a>
        <a href="/api/export_csv" class="btn-nav" style="background: #10b981; border: none; cursor: pointer;">⬇ Export Database to CSV</a>
    </div>

    <div class="glass-card admin-container">
        <h2 style="text-align: left; margin-bottom: 2rem;">Admin Dashboard</h2>

        <div class="section">
            <h3>User Management</h3>
            <div class="add-user-bar">
                <input type="text" id="newUsername" placeholder="New Username">
                <input type="password" id="newPassword" placeholder="New Password">
                <select id="newRole">
                    <option value="user">Standard User</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="btn-sm btn-success" onclick="addUser()">+ Add Account</button>
            </div>
            <table>
                <thead><tr><th>ID</th><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>

        <div class="section">
            <h3>Wallpaper Settings</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px;">Click to apply pre-built, or upload custom.</p>
            <div class="wallpaper-thumbs">
                <img src="https://images.unsplash.com/photo-1555255707-c07966088b7b?q=80&w=2070&auto=format&fit=crop" class="thumb" onclick="setWall(this.src)">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop" class="thumb" onclick="setWall(this.src)">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2064&auto=format&fit=crop" class="thumb" onclick="setWall(this.src)">
            </div>
            <div class="add-user-bar" style="margin-top: 1rem;">
                <input type="file" id="customWall" accept="image/*" style="padding-top: 5px;">
                <button class="btn-sm btn-success" onclick="uploadWall()">Upload & Apply</button>
            </div>
        </div>

        <div class="section">
            <h3>Subject Ratings Database</h3>
            <table>
                <thead><tr><th>ID</th><th>Subject Name</th><th>Score</th></tr></thead>
                <tbody id="ratingsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Load Wallpaper
        fetch('/api/settings/wallpaper').then(r=>r.json()).then(d => document.body.style.backgroundImage = `url('${d.url}')`);

        async function loadData() {
            // Load Users
            const uRes = await fetch('/api/admin/users');
            const users = await uRes.json();
            document.getElementById('usersTable').innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td><td>${u.username}</td><td><span style="color:${u.role==='admin'?'#3b82f6':'#10b981'}">${u.role}</span></td>
                    <td>
                        <button class="btn-sm btn-warning" onclick="changePass(${u.id})">Change Pass</button>
                        <button class="btn-sm btn-danger" onclick="delUser(${u.id})">Delete</button>
                    </td>
                </tr>
            `).join('');

            // Load Ratings
            const rRes = await fetch('/api/ratings');
            const ratings = await rRes.json();
            document.getElementById('ratingsTable').innerHTML = ratings.map(r => `
                <tr><td>${r.id}</td><td>${r.subject_name}</td><td><span style="background:rgba(139,92,246,0.3); padding:2px 8px; border-radius:4px;">${r.score}</span></td></tr>
            `).join('');
        }

        async function addUser() {
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            const role = document.getElementById('newRole').value;
            if(!username || !password) return alert("Fill all fields");
            await fetch('/api/admin/users', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password, role})});
            loadData();
        }

        async function delUser(id) {
            if(confirm("Delete this user?")) {
                await fetch('/api/admin/users', { method: 'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id})});
                loadData();
            }
        }

        async function changePass(id) {
            const new_password = prompt("Enter new password for this user:");
            if(new_password) {
                await fetch('/api/admin/users', { method: 'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id, new_password})});
                alert("Password updated!");
            }
        }

        async function setWall(url) {
            await fetch('/api/settings/wallpaper', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({url})});
            document.body.style.backgroundImage = `url('${url}')`;
        }

        async function uploadWall() {
            const file = document.getElementById('customWall').files[0];
            if(!file) return alert("Select a file");
            const reader = new FileReader();
            reader.onload = async () => {
                await setWall(reader.result); // Save Base64 string directly to DB
            };
            reader.readAsDataURL(file);
        }

        loadData();
    </script>
</body>
</html>
